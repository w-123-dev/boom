<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomArena - еӨ§еҺ…</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/lobby.css">
</head>
<body>
  <div class="lobby-container">
    <header>
      <h1>рҹ’Ј BoomArena</h1>
      <div class="user-info">
        <span id="userDisplay"></span>
        <span class="rating">рҹҸҶ <span id="ratingDisplay">1000</span></span>
        <a href="/profile.html" class="btn-link">дёӘдәә</a>
        <a href="/leaderboard.html">жҺ’иЎҢ</a>
        <a href="#" id="logoutBtn" style="color:#ef5350;">йҖҖеҮ?/a>
      </div>
    </header>

    <div class="lobby-grid">
      <div class="room-section">
        <h2>рҹҺ® жёёжҲҸжҲҝй—ҙ</h2>
        <div class="create-room-bar">
          <input type="text" id="roomCodeInput" placeholder="иҫ“е…ҘжҲҝй—ҙз ҒеҠ е…? maxlength="6">
          <button id="joinRoomBtn">еҠ е…Ҙ</button>
          <button id="createRoomBtn" class="success">еҲӣе»әжҲҝй—ҙ</button>
        </div>
        <div class="room-list" id="roomList">
          <div style="text-align:center;color:#666;padding:20px;">жҡӮж— жҲҝй—ҙпјҢеҲӣе»әдёҖдёӘејҖе§ӢжёёжҲҸеҗ§</div>
        </div>
      </div>

      <div class="chat-section">
        <h2>рҹ’¬ еӨ§еҺ…иҒҠеӨ©</h2>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-bar">
          <input type="text" id="chatInput" placeholder="жҢ?Enter еҸ‘йҖ?.." maxlength="100">
          <button id="chatSendBtn">еҸ‘йҖ?/button>
        </div>
        <div class="online-users">
          <h3>рҹҹў еңЁзәҝзҺ©е®¶ <span id="onlineCount">0</span></h3>
          <div id="onlineList"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="joinPasswordModal" class="modal-overlay hidden">
    <div class="modal">
      <h2>еҠ е…ҘжҲҝй—ҙ</h2>
      <p id="joinRoomInfo" style="margin-bottom:12px;color:#888;"></p>
      <form id="joinPasswordForm">
        <input type="password" id="roomPassword" placeholder="жҲҝй—ҙеҜҶз ҒпјҲеҰӮдёҚйңҖиҰҒз•ҷз©әпјү">
        <div class="error" id="joinError"></div>
        <button type="submit">еҠ е…Ҙ</button>
        <button type="button" class="danger" onclick="closeJoinModal()">еҸ–ж¶Ҳ</button>
      </form>
    </div>
  </div>

  <script src="/assets/socket.io.min.js"></script>
<script src="/js/api.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/lobby.js"></script>
</body>
</html>
