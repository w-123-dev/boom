<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomArena - 注册</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>💣</h1>
      <h1>BoomArena</h1>
      <p class="subtitle">注册新账号</p>
      <form id="registerForm">
        <input type="text" id="username" placeholder="用户名（2-16个字符）" required autocomplete="off">
        <input type="text" id="nickname" placeholder="昵称（显示用）" required autocomplete="off">
        <input type="password" id="password" placeholder="密码（至少4位）" required autocomplete="new-password">
        <div class="error" id="errorMsg"></div>
        <button type="submit">注 册</button>
      </form>
      <p>已有账号？<a href="/login.html">去登录</a></p>
    </div>
  </div>
  <script>
    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true; btn.textContent = '注册中...';
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            nickname: document.getElementById('nickname').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          document.getElementById('errorMsg').textContent = data.error;
        }
      } catch { document.getElementById('errorMsg').textContent = '网络错误'; }
      btn.disabled = false; btn.textContent = '注 册';
    };
  </script>
</body>
</html>
