<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomArena - Game</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body { margin: 0; overflow: hidden; background: #0d0d1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .game-wrapper { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 0 40px rgba(79,195,247,0.1), 0 8px 32px rgba(0,0,0,0.5); }
    
    #gameCanvas { display: block; border: 1px solid rgba(79,195,247,0.15); image-rendering: pixelated; background: #1a1a2e; }
    .hud { position: absolute; top: 8px; left: 8px; right: 8px; display: flex; justify-content: space-between; pointer-events: none; flex-wrap: wrap; gap: 4px; z-index: 5; }
    .hud-player { background: rgba(0,0,0,0.75); border-radius: 8px; padding: 5px 10px; font-size: 12px; border: 1px solid rgba(79,195,247,0.1); backdrop-filter: blur(4px); }
    .hud-player .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 10; padding: 20px;
      backdrop-filter: blur(2px);
    }
    .overlay h2 { font-size: 32px; margin-bottom: 16px; color: #4fc3f7; text-shadow: 0 0 30px rgba(79,195,247,0.4); }
    .controls-hint {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #888; font-size: 12px; padding: 5px 14px; border-radius: 8px;
      pointer-events: none; backdrop-filter: blur(4px); border: 1px solid rgba(79,195,247,0.08);
    }
    .btn { margin: 4px; min-width: 140px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="game-wrapper" id="gameWrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="hud" id="hud"></div>
    <div class="controls-hint">Arrow keys to move | Space to bomb</div>
    <div id="gameOverOverlay" class="overlay hidden">
    <div id="reconnectOverlay" class="overlay hidden" style="z-index:9;">
      <h2 style="font-size:28px;color:#ffd54f;">🔌 连接断开</h2>
      <div style="color:#aaa;font-size:14px;margin-bottom:12px;">正在尝试重新连接...</div>
      <div id="reconnectCountdown" style="font-size:24px;color:#ef5350;font-weight:bold;">30</div>
    </div>
      <h2 id="gameResult"></h2>
      <div id="gameWinner" style="margin-bottom:12px;text-align:center;"></div>
      <div>
        <button id="backBtn" class="btn">Spectate</button>
        <button id="leaveBtn" class="btn btn-danger">Leave Game</button>
      <button id="soundToggleBtn" class="btn btn-sm btn-ghost" style="position:absolute;top:8px;right:8px;padding:4px 10px;font-size:11px;min-width:auto;">🔊 Sound ON</button>
      </div>
    </div>
  </div>

  <script src="/assets/socket.io.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/sound.js"></script>
  <script src="/js/renderer/index.js"></script>
  <script src="/js/game-client.js"></script>
</body>
</html>
