<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomArena - 登录</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>💣</h1>
      <h1>BoomArena</h1>
      <p class="subtitle">炸弹人竞技场</p>
      <form id="loginForm">
        <input type="text" id="username" placeholder="用户名" required autocomplete="username">
        <input type="password" id="password" placeholder="密码" required autocomplete="current-password">
        <div class="error" id="errorMsg"></div>
        <button type="submit" class="btn" style="width:100%;">登 录</button>
      </form>
      <p>还没有账号？<a href="/register.html">立即注册</a></p>
      <p style="margin-top:6px;font-size:12px;"><a href="/admin.html" style="color:#666;">管理员登录</a></p>
    </div>
  </div>
  <script>
    const token = localStorage.getItem('token');
    if (token) { window.location.href = '/'; }
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true; btn.textContent = '登录中...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          document.getElementById('errorMsg').textContent = data.error;
        }
      } catch { document.getElementById('errorMsg').textContent = '网络错误'; }
      btn.disabled = false; btn.textContent = '登 录';
    };
  </script>
</body>
</html>
