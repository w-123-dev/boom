<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomArena - 排行榜</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .lb-container { max-width: 600px; margin: 0 auto; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #0f3460; margin-bottom: 20px; }
    .lb-table { width: 100%; background: #16213e; border-radius: 12px; overflow: hidden; }
    .lb-row { display: flex; padding: 12px 16px; border-bottom: 1px solid #0f3460; align-items: center; }
    .lb-row:last-child { border-bottom: none; }
    .lb-row.header { color: #888; font-size: 13px; }
    .lb-rank { width: 40px; text-align: center; font-weight: bold; }
    .lb-rank.gold { color: #ffd54f; }
    .lb-rank.silver { color: #b0bec5; }
    .lb-rank.bronze { color: #ffab91; }
    .lb-name { flex: 1; }
    .lb-rating { width: 60px; text-align: right; color: #4fc3f7; font-weight: bold; }
    .lb-wins { width: 60px; text-align: right; color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <div class="lb-container">
    <header class="glass-header">
      <h1>💣 BoomArena</h1>
      <a href="/">← 返回大厅</a>
    </header>

    <h2 style="font-size:18px;margin-bottom:16px;">🏆 积分排行榜</h2>

    <div class="lb-table" id="lbTable">
      <div class="lb-row header">
        <div class="lb-rank">#</div>
        <div class="lb-name">玩家</div>
        <div class="lb-rating">积分</div>
        <div class="lb-wins">胜场</div>
      </div>
      <div style="text-align:center;color:#666;padding:20px;">加载中...</div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    async function loadLeaderboard() {
      try {
        const data = await API.get('/api/user/leaderboard');
        const table = document.getElementById('lbTable');
        const rankClass = ['gold', 'silver', 'bronze'];
        table.innerHTML = `
          <div class="lb-row header">
            <div class="lb-rank">#</div>
            <div class="lb-name">玩家</div>
            <div class="lb-rating">积分</div>
            <div class="lb-wins">胜场</div>
          </div>
          ${data.map((u, i) => `
            <div class="lb-row">
              <div class="lb-rank ${i < 3 ? rankClass[i] : ''}">${i + 1}</div>
              <div class="lb-name">${u.nickname}</div>
              <div class="lb-rating">${u.rating}</div>
              <div class="lb-wins">${u.wins}胜</div>
            </div>
          `).join('')}
        `;
      } catch (e) {
        document.getElementById('lbTable').innerHTML += '<div style="color:red;padding:12px;">加载失败</div>';
      }
    }
    loadLeaderboard();
  </script>
</body>
</html>
