<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomArena - 大厅</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/lobby.css">
</head>
<body>
  <div class="lobby-container">
    <header>
      <h1>💣 BoomArena</h1>
      <div class="user-info">
        <span id="userDisplay"></span>
        <span class="rating">🏆 <span id="ratingDisplay">1000</span></span>
        <a href="/profile.html" class="btn-link">个人</a>
        <a href="/leaderboard.html">排行</a>
        <a href="#" id="logoutBtn" style="color:#ef5350;">退出</a>
      </div>
    </header>

    <div class="lobby-grid">
      <div class="room-section">
        <h2>🎮 游戏房间</h2>
        <div class="create-room-bar">
          <input type="text" id="roomCodeInput" placeholder="输入房间码加入" maxlength="6">
          <button id="joinRoomBtn">加入</button>
          <button id="createRoomBtn" class="success">创建房间</button>
        </div>
        <div class="room-list" id="roomList">
          <div style="text-align:center;color:#666;padding:20px;">暂无房间，创建一个开始游戏吧</div>
        </div>
      </div>

      <div class="chat-section">
        <h2>💬 大厅聊天</h2>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-bar">
          <input type="text" id="chatInput" placeholder="按 Enter 发送..." maxlength="100">
          <button id="chatSendBtn">发送</button>
        </div>
        <div class="online-users">
          <h3>🟢 在线玩家 <span id="onlineCount">0</span></h3>
          <div id="onlineList"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="joinPasswordModal" class="modal-overlay hidden">
    <div class="modal">
      <h2>加入房间</h2>
      <p id="joinRoomInfo" style="margin-bottom:12px;color:#888;"></p>
      <form id="joinPasswordForm">
        <input type="password" id="roomPassword" placeholder="房间密码（如不需要留空）">
        <div class="error" id="joinError"></div>
        <button type="submit">加入</button>
        <button type="button" class="danger" onclick="closeJoinModal()">取消</button>
      </form>
    </div>
  </div>

  <script src="/assets/socket.io.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/lobby.js"></script>
</body>
</html>
